services:
  pdf-extractor:
    build: .
    image: pdf-extractor:latest
    environment:
      - PORT=8083
    ports:
      - "8083:8083"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    # optional: mount the workspace so you can change code without rebuilding
    # volumes:
    #   - ./:/app
